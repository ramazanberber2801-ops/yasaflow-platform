name: RC quality checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: rc-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          status=$?
          tail -n 160 lint.log
          exit $status

      - name: Production build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          tail -n 160 build.log
          exit $status

# Re-run checks after lint fixes
